<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>PEPE CLAIM</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />

<!-- Adsgram SDK -->
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>

<script src="https://w.tads.me/widget.js"></script>
<script src='//libtl.com/sdk.js' data-zone='11217138' data-sdk='show_11217138'></script>
</head>
<body>

<div id="app">

  <!-- ===== HEADER / BALANCE HERO ===== -->
  <header class="balance-card">
    <div class="balance-card__top">
      <span class="balance-card__label">SOLDE</span>
      <span class="balance-card__username" id="username">@chargement...</span>
    </div>
    <div class="balance-card__amount">
      <span id="balanceValue">0</span>
      <span class="balance-card__unit">PEPE</span>
    </div>
    <div class="balance-card__stats">
      <div class="stat">
        <span class="stat__value" id="claimsRemaining">--</span>
        <span class="stat__label">Claims restants</span>
      </div>
      <div class="stat">
        <span class="stat__value" id="todaysEarnings">--</span>
        <span class="stat__label">Gains aujourd'hui</span>
      </div>
      <div class="stat">
        <span class="stat__value" id="referralCount">--</span>
        <span class="stat__label">Filleuls</span>
      </div>
    </div>
  </header>

   <!-- ===== BANNIÈRE PUBLICITAIRE TADS (TGB) — visible sur tous les écrans ===== -->
  <div class="ad-banner-wrapper">
    <div id="tads-container-10248"></div>
  </div>

  <!-- ===== SCREENS ===== -->

  <!-- ===== SCREENS ===== -->
  <main id="screens">

    <!-- HOME -->
    <section class="screen active" id="screen-home">
      <div class="action-grid">
        <button class="action-btn action-btn--primary" data-nav="claim">
          <span class="action-btn__icon">🎬</span>
          <span class="action-btn__label">Claim 100 PEPE</span>
        </button>
        <button class="action-btn action-btn--primary" data-nav="bonus">
          <span class="action-btn__icon">🎁</span>
          <span class="action-btn__label">Daily Bonus</span>
        </button>
      </div>
    </section>

    <!-- GAME: LUCKY NUMBER -->
    <section class="screen" id="screen-game-lucky">
      <button class="back-btn" data-nav="games">← Retour</button>
      <h2 class="screen-title">🎯 Lucky Number <span class="game-card__multiplier">x5</span></h2>

      <div class="game-stage">
        <div class="lucky-number-display" id="luckyDisplay">?</div>
      </div>

      <div class="card">
        <select class="choice-select" id="choiceLucky">
          <option value="">Choisissez 1 à 10</option>
          <option value="1">1</option><option value="2">2</option><option value="3">3</option>
          <option value="4">4</option><option value="5">5</option><option value="6">6</option>
          <option value="7">7</option><option value="8">8</option><option value="9">9</option>
          <option value="10">10</option>
        </select>
        <input type="number" class="bet-input" id="betLucky" placeholder="Mise (min 100)" min="100" />
        <button class="btn btn--primary btn--full play-btn" data-game="lucky_number">Jouer</button>
        <p class="game-result" id="resultLucky"></p>
      </div>
    </section>

    <!-- GAME: SLOTS -->
    <section class="screen" id="screen-game-slots">
      <button class="back-btn" data-nav="games">← Retour</button>
      <h2 class="screen-title">🎰 PEPE Slots <span class="game-card__multiplier">x10</span></h2>

      <div class="game-stage">
        <div class="slots-machine">
          <div class="slot-reel" id="reel1"><div class="slot-reel__inner">🐸</div></div>
          <div class="slot-reel" id="reel2"><div class="slot-reel__inner">🐸</div></div>
          <div class="slot-reel" id="reel3"><div class="slot-reel__inner">🐸</div></div>
        </div>
      </div>

      <div class="card">
        <input type="number" class="bet-input" id="betSlots" placeholder="Mise (min 100)" min="100" />
        <button class="btn btn--primary btn--full play-btn" data-game="slots">Jouer</button>
        <p class="game-result" id="resultSlots"></p>
      </div>
    </section>

    <!-- HISTORY -->
    <section class="screen" id="screen-history">
      <h2 class="screen-title">📜 History</h2>
      <div class="history-list" id="historyList">
        <p class="hint">Chargement de l'historique...</p>
      </div>
    </section>

    <!-- ===== BANNIÈRE BAS DE PAGE A-ADS ===== -->
  <div class="ad-banner-bottom">
    <iframe data-aa='2446332' src='//acceptable.a-ads.com/2446332/?size=Adaptive'
      style='border:0; padding:0; width:70%; height:auto; overflow:hidden; display:block; margin:auto'></iframe>
  </div>

  </main>

  <!-- ===== BOTTOM NAV ===== -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-nav="home"><span>🏠</span><small>Home</small></button>
    <button class="nav-btn" data-nav="referrals"><span>👥</span><small>Referrals</small></button>
    <button class="nav-btn" data-nav="games"><span>🏆</span><small>Games</small></button>
    <button class="nav-btn" data-nav="balance"><span>💰</span><small>Balance</small></button>
    <button class="nav-btn" data-nav="history"><span>📜</span><small>History</small></button>
  
    

  <!-- ===== BOTTOM NAV ===== -->
  <nav class="bottom-nav">

  </nav>

  <!-- ===== TOAST ===== -->
  <div id="toast" class="toast"></div>

</div>

<script src="js/api.js"></script>
<script src="js/telegram.js"></script>
<script src="js/ui.js"></script>
<script src="js/ads.js"></script>
<script src="js/app.js"></script>

<script src="https://ad.gigapub.tech/script?id=7129"></script>

<script>
    const adsNotFoundCallbackTGB = () => {
        console.log('Aucune publicité TGB disponible');
    };

    const onClickRewardCallbackTGB = (adId) => {
        console.log('Pub TGB cliquée:', adId);
    };

    const tgbController = window.tads.init({
        widgetId: '10248',
        type: 'static',
        debug: false,
        onClickReward: onClickRewardCallbackTGB,
        onAdsNotFound: adsNotFoundCallbackTGB
    });

    tgbController.loadAd()
        .then(() => tgbController.showAd())
        .catch((err) => {
            console.log(err);
            adsNotFoundCallbackTGB();
        });
</script>

<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js')
            .then(() => console.log('Service Worker Monetag enregistré'))
            .catch((err) => console.warn('Service Worker erreur:', err));
    }
</script>

</body>
</html>
